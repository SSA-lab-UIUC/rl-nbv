# ============================================================
# COMPLETE TRAINING CONFIG
# ============================================================

# Dataset
dataset:
  dataset_path: ./dataset
  train_data_path: ./data/train
  verify_data_path: ./data/verify/
  test_data_path: ./data/test/

# Environment
environment:
  view_num: 33
  viewpoints_path: ./output/acrimsat_final/viewpoints_33.txt
  begin_view: -1
  observation_space_dim: 1024
  is_normalize: 1
  terminated_coverage: 0.97
  max_step: 11
  is_ratio_reward: 1
  is_reward_with_cur_coverage: 0
  cur_coverage_ratio: 1.0
  time_cost_weight: 1.0
  delta_v_weight: 1.0
  fuel_budget: 50.0
  target_orbit:
    orbit_radius: 1.0
    grav_param: 1.0
    num_orbits: 2.0
  state_reward:
    revisit_penalty: -5.0
    coverage_coeff: 1.0
  is_vec_env: 1
  env_num: 8
  sun_position:
    initial_direction: [1.0, 0.0, 0.0]
    orbital_params:
      angular_velocity_rad_per_s: 0.0
      initial_phase_rad: 0.0
      time_offset_s: 0.0

# Training
training:
  step_size: 10
  is_ratio_reward: 1
  is_profile: 0
  resume: 1

  # DQN Hyperparameters
  dqn:
    device: cuda:0
    learning_rate: 0.001
    batch_size: 128
    buffer_size: 100000
    learning_starts: 3000
    exploration_fraction: 0.5
    exploration_final_eps: 0.2
    gradient_steps: 1
    train_freq: 16
    gamma: 0.1
    total_steps: 500000

  # Pretrained PointNet
  pretrained:
    is_transform: 1
    model_path: ./models/pretrained/pointnet2_ssg_wo_normals/checkpoints/best_model.pth
    is_freeze_fe: 0

  # Replay Buffer
  replay_buffer:
    is_load_replay_buffer: 0
    load_replay_buffer_path: ./artefacts/rbg/ideal_policy.pkl # Using the last generated replay buffer for training
    is_save_replay_buffer: 1
    save_replay_buffer_path: ./artefacts/train/dqn_replay_buffer.pkl

  # Saving & Output
  output:
    output_file: ./artefacts/train/train_result.txt
    checkpoint_path: ./artefacts/train/checkpoints
    final_model_path: ./artefacts/train/final
    save_freq: 10000
    eval_freq: 10000
    is_save_model: 1

  # Logging
  logging:
    log_file: ./artefacts/train/train.log
    coverage_log_freq_normal: 50000
    coverage_log_freq_profile: 200
    progress_log_interval: 10

# Replay Buffer Generation (Oracle Policy)
replay_buffer_generation:
  step_size: 10
  buffer_size: 100000
  save_path: ./artefacts/rbg/ideal_policy.pkl
  log_path: ./artefacts/rbgreplay_buffer.log
  is_load_buffer: 0
  load_path: null
  is_add_negative_exp: 1
  negative_exp_factor: 0.03
  is_ratio_reward: 0
  is_reward_with_cur_coverage: 0
  cur_coverage_ratio: 1.0

# Dataset Splitting
dataset_splitting:
  train_ratio: 0.7
  verify_ratio: 0.15
  test_ratio: 0.15
  seed: 42
  log_path: ./artefacts/ds/split_dataset.log
